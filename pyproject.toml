[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "rlprof"
version = "0.1.0"
description = "Profile vLLM inference under RL training workloads."
requires-python = ">=3.10"
dependencies = [
    "aiohttp",
    "click",
    "rich",
]

[project.optional-dependencies]
bench = [
    "torch>=2.2",
    "triton>=2.2",
]

[project.scripts]
rlprof = "rlprof.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
