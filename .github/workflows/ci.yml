name: ci

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ libsqlite3-dev

      - name: Configure
        run: cmake -S . -B build

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: CLI smoke
        run: |
          ./build/rlprof help
          ./build/rlprof version
          ./build/rlprof doctor
          ./build/rlprof target --help
          ./build/rlprof export --help
          ./build/rlprof artifacts --help
          ./build/rlprof trace --help
          ./build/rlprof validate --help
          ./build/rlprof manifest --help
          ./build/rlprof cleanup --help
          ./build/rlprof cluster-profile --help
          ./build/rlprof soak-profile --help
          ./build/rlprof completion bash >/tmp/rlprof.bash
